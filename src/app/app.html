<div class="flex flex-col h-screen gap-5">
  <header class="bg-blue-500 p-5">
    <h1 class="text-white text-2xl font-bold text-heading">{{title()}}</h1>
    <div class="flex gap-1">
      <a href="#"
         [class]="language() !== 'en' ? '' : 'text-white underline font-bold'"
         (click)="setLanguage('en')"
         class="text-white">English {{language()}}</a>
      /
      <a href="#"
         [class]="language() !== 'vi' ? '' : 'text-white underline font-bold'"
         (click)="setLanguage('vi')"
         class="text-white">Tiếng Việt</a>
    </div>
  </header>
  <div id="content"
       class="grow p-5">
    <app-expense-form></app-expense-form>
    <hr class="mt-5 mb-5">
    <app-expense-list></app-expense-list>
  </div>
</div>
