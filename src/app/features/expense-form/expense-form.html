<div class="flex flex-col gap-3">
  <app-block-title [title]="title()"></app-block-title>
  <div class="flex flex-col gap-1">
    <app-label [labelTexts]="'amount' | transloco"></app-label>
    <input type="text"
           [value]="amount()"
           (input)="onAmountInput($event)"
           placeholder="0"
           class="border rounded-md p-3 pt-1 pb-1">
  </div>
  <div class="flex flex-col gap-1">
    <app-label [labelTexts]="'notes' | transloco"></app-label>
    <textarea [value]="notes()"
              (input)="onNotesChanged($event)"
              class="border rounded-md p-3 pt-1 pb-1"></textarea>
  </div>
  <div class="flex flex-col gap-1">
    <app-label [labelTexts]="'type' | transloco"></app-label>
    <select #typeSelect class="border rounded-md">
      @for (expenseType of expenseTypes(); track expenseType.id) {
        <option [value]="expenseType.id" [selected]="expenseType.selected">{{expenseType.name}}</option>
      }
    </select>
  </div>
  <button (click)="save()"
          class="border rounded-md mt-5 p-3 pt-1 pb-1 bg-blue-700 text-white">{{ 'save' | transloco }}</button>
</div>
